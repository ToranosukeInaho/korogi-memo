<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>現場メモ｜ローストチキンコオロギ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111;
  --surface: #1C1C1C;
  --surface2: #252525;
  --border: #333;
  --orange: #FF6B2B;
  --orange-dim: rgba(255,107,43,0.15);
  --text: #F0EDE8;
  --muted: #777;
  --green: #2ECC71;
  --green-dim: rgba(46,204,113,0.12);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px;
}

/* ── HEADER ── */
.header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left .store {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--orange);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.header-left .title {
  font-size: 18px;
  font-weight: 900;
  line-height: 1;
}

.date-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  text-align: right;
  font-family: 'DM Mono', monospace;
}

.date-chip .dc-date {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.date-chip .dc-day {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── WEATHER STRIP ── */
.weather-strip {
  margin: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.weather-strip .ws-icon { font-size: 28px; }

.weather-strip .ws-info { flex: 1; }
.weather-strip .ws-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.weather-strip .ws-val {
  font-size: 15px;
  font-weight: 700;
  margin-top: 2px;
}

.weather-strip .ws-temp {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--orange);
}

.ws-loading {
  font-size: 12px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  animation: pulse 1.5s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── SECTION ── */
.section {
  margin: 16px 16px 0;
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-left: 2px;
}

/* ── INPUT CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 10px;
}

.field {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.field:last-child { border-bottom: none; }

.field-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }

.field-body { flex: 1; }

.field-label {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}

.field input,
.field select,
.field textarea {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 16px;
  font-weight: 700;
  width: 100%;
  -webkit-appearance: none;
}

.field input[type="number"] {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
}

.field input::placeholder,
.field textarea::placeholder { color: #444; font-weight: 400; font-size: 15px; }

.field select { font-size: 15px; font-weight: 700; }
.field select option { background: #222; }

.field textarea {
  resize: none;
  line-height: 1.6;
  font-size: 14px;
  font-weight: 400;
  min-height: 72px;
}

.field-unit {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  flex-shrink: 0;
}

/* ── MENU ITEMS ── */
.menu-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.menu-item {
  display: grid;
  grid-template-columns: 1fr 100px 36px;
  align-items: center;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}

.menu-item:last-child { border-bottom: none; }

.menu-name {
  font-size: 14px;
  font-weight: 700;
}

.menu-name input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px;
  font-weight: 700;
  width: 100%;
}

.menu-name input::placeholder { color: #444; font-weight: 400; }

.qty-control {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border-radius: 8px;
  padding: 4px;
}

.qty-btn {
  width: 28px;
  height: 28px;
  background: var(--border);
  border: none;
  border-radius: 6px;
  color: var(--text);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
  flex-shrink: 0;
  line-height: 1;
}

.qty-btn:active { background: var(--orange); }

.qty-val {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  min-width: 24px;
  text-align: center;
  color: var(--text);
}

.menu-del {
  background: none;
  border: none;
  color: #444;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s;
}

.menu-del:active { color: #E05555; }

.add-menu-btn {
  width: 100%;
  padding: 14px;
  background: none;
  border: 1.5px dashed var(--border);
  border-radius: 12px;
  color: var(--muted);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px;
  cursor: pointer;
  margin-top: 8px;
  transition: border-color 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.add-menu-btn:active { border-color: var(--orange); color: var(--orange); }

/* ── SUBMIT ── */
.submit-area {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(to top, #111 60%, transparent);
  z-index: 20;
  max-width: 480px;
  margin: 0 auto;
  left: 50%;
  transform: translateX(-50%);
}

.submit-btn {
  width: 100%;
  padding: 18px;
  background: var(--orange);
  border: none;
  border-radius: 14px;
  color: white;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.05em;
}

.submit-btn:active { opacity: 0.85; transform: scale(0.98); }

/* ── SAVED TOAST ── */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--green);
  color: white;
  padding: 12px 24px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 700;
  z-index: 100;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ── SAVED LIST ── */
.saved-section {
  margin: 16px 16px 0;
}

.saved-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  font-size: 12px;
}

.saved-item .si-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.saved-item .si-time {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.saved-item .si-place {
  font-weight: 700;
  font-size: 14px;
}

.saved-item .si-revenue {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  color: var(--orange);
}

.saved-item .si-detail {
  color: var(--muted);
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  margin-top: 4px;
}

.copy-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  cursor: pointer;
  transition: color 0.15s;
}

.copy-btn:active { color: var(--green); }

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 16px 0;
}
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="store">🍗 Roast Chicken Korogi</div>
      <div class="title">現場メモ</div>
    </div>
    <div class="date-chip">
      <div class="dc-date" id="dateDisplay">—</div>
      <div class="dc-day" id="dayDisplay">—</div>
    </div>
  </div>

  <!-- Weather Auto -->
  <div class="weather-strip">
    <div class="ws-icon" id="weatherIcon">⏳</div>
    <div class="ws-info">
      <div class="ws-label">天気（自動取得）</div>
      <div class="ws-val" id="weatherLabel"><span class="ws-loading">取得中...</span></div>
    </div>
    <div class="ws-temp" id="weatherTemp">—</div>
  </div>

  <!-- 基本情報 -->
  <div class="section">
    <div class="section-label">基本情報</div>
    <div class="card">
      <div class="field">
        <div class="field-icon">📍</div>
        <div class="field-body">
          <div class="field-label">出店場所</div>
          <input type="text" id="location" placeholder="例：渋谷ヒカリエ前" autocomplete="off">
        </div>
      </div>
      <div class="field">
        <div class="field-icon">🕐</div>
        <div class="field-body">
          <div class="field-label">出店時間</div>
          <input type="text" id="hours" placeholder="例：11:00 〜 18:00">
        </div>
      </div>
    </div>
  </div>

  <!-- 売上 -->
  <div class="section">
    <div class="section-label">売上</div>
    <div class="card">
      <div class="field">
        <div class="field-icon">💰</div>
        <div class="field-body">
          <div class="field-label">売上合計</div>
          <input type="number" id="revenue" placeholder="0" inputmode="numeric">
        </div>
        <div class="field-unit">円</div>
      </div>
      <div class="field">
        <div class="field-icon">👥</div>
        <div class="field-body">
          <div class="field-label">客数（後から記入でもOK）</div>
          <input type="number" id="customers" placeholder="—" inputmode="numeric">
        </div>
        <div class="field-unit">人</div>
      </div>
    </div>
  </div>

  <!-- 商材別 -->
  <div class="section">
    <div class="section-label">商材別 販売数</div>
    <div class="menu-list" id="menuList">
      <!-- JS で生成 -->
    </div>
    <button class="add-menu-btn" id="addMenuBtn">＋ 商材を追加</button>
  </div>

  <!-- メモ -->
  <div class="section">
    <div class="section-label">メモ・気づき</div>
    <div class="card">
      <div class="field">
        <div class="field-icon">📝</div>
        <div class="field-body">
          <div class="field-label">イベント情報・特記事項（後から補完でもOK）</div>
          <textarea id="memo" placeholder="例：近くでマルシェ開催、14時から急に混んだ、など"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- 過去の記録 -->
  <div class="divider"></div>
  <div class="saved-section">
    <div class="section-label" style="margin:16px 0 10px;">保存済み（今日）</div>
    <div id="savedList"></div>
  </div>

</div>

<!-- Submit -->
<div class="submit-area">
  <button class="submit-btn" id="submitBtn">📋 メモを保存する</button>
</div>

<!-- Toast -->
<div class="toast" id="toast">✅ 保存しました</div>

<script>
// ── 日付表示 ──
const days = ['日','月','火','水','木','金','土'];
const now = new Date();
document.getElementById('dateDisplay').textContent =
  `${now.getMonth()+1}/${now.getDate()}`;
document.getElementById('dayDisplay').textContent =
  `${now.getFullYear()} (${days[now.getDay()]})`;

// ── 天気取得（Open-Meteo + 位置情報） ──
const weatherCodes = {
  0:'快晴',1:'晴れ',2:'晴れ時々曇り',3:'曇り',
  45:'霧',48:'霧',51:'小雨',53:'雨',55:'雨',
  61:'小雨',63:'雨',65:'大雨',71:'雪',73:'雪',75:'大雪',
  80:'にわか雨',81:'にわか雨',82:'大雨',95:'雷雨',99:'雷雨'
};
const weatherIcons = {
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',
  45:'🌫',48:'🌫',51:'🌦',53:'🌧',55:'🌧',
  61:'🌦',63:'🌧',65:'🌧',71:'🌨',73:'❄️',75:'❄️',
  80:'🌦',81:'🌧',82:'⛈',95:'⛈',99:'⛈'
};

let fetchedWeather = { icon:'—', label:'取得できず', temp:'—' };

function getWeather(lat, lon) {
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,precipitation&timezone=Asia%2FTokyo`)
    .then(r => r.json())
    .then(d => {
      const code = d.current.weathercode;
      const temp = Math.round(d.current.temperature_2m);
      const rain = d.current.precipitation;
      const label = weatherCodes[code] || '—';
      const icon = weatherIcons[code] || '🌡';
      fetchedWeather = { icon, label, temp: `${temp}℃`, rain: `${rain}mm`, code };
      document.getElementById('weatherIcon').textContent = icon;
      document.getElementById('weatherLabel').textContent = label + (rain > 0 ? `（降水${rain}mm）` : '');
      document.getElementById('weatherTemp').textContent = `${temp}℃`;
    })
    .catch(() => {
      document.getElementById('weatherLabel').textContent = '取得失敗（手動で入力を）';
      document.getElementById('weatherTemp').textContent = '—';
    });
}

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(pos.coords.latitude, pos.coords.longitude),
    () => getWeather(35.6762, 139.6503) // fallback: 東京
  );
} else {
  getWeather(35.6762, 139.6503);
}

// ── 商材リスト ──
let menuItems = [
  { name: 'ローストチキン', qty: 0 },
];

function renderMenuList() {
  const list = document.getElementById('menuList');
  list.innerHTML = menuItems.map((item, i) => `
    <div class="menu-item">
      <div class="menu-name">
        <input type="text" value="${item.name}" placeholder="商材名" 
          oninput="menuItems[${i}].name=this.value" autocomplete="off">
      </div>
      <div class="qty-control">
        <button class="qty-btn" ontouchstart="" onclick="changeQty(${i},-1)">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" ontouchstart="" onclick="changeQty(${i},1)">＋</button>
      </div>
      <button class="menu-del" onclick="deleteMenu(${i})">×</button>
    </div>
  `).join('');
}

function changeQty(i, delta) {
  menuItems[i].qty = Math.max(0, menuItems[i].qty + delta);
  renderMenuList();
}

function deleteMenu(i) {
  menuItems.splice(i, 1);
  renderMenuList();
}

document.getElementById('addMenuBtn').addEventListener('click', () => {
  menuItems.push({ name: '', qty: 0 });
  renderMenuList();
  // フォーカス
  setTimeout(() => {
    const inputs = document.querySelectorAll('.menu-name input');
    inputs[inputs.length - 1]?.focus();
  }, 50);
});

renderMenuList();

// ── 保存 ──
let savedRecords = JSON.parse(localStorage.getItem('korogi_records') || '[]');

function renderSaved() {
  const container = document.getElementById('savedList');
  const todayRecords = savedRecords.filter(r => r.date === getDateStr());
  if (todayRecords.length === 0) {
    container.innerHTML = `<div style="font-size:12px;color:#555;font-family:'DM Mono',monospace;padding:8px 0;">まだ保存なし</div>`;
    return;
  }
  container.innerHTML = todayRecords.slice().reverse().map((r, i) => `
    <div class="saved-item">
      <div class="si-header">
        <div>
          <div class="si-place">${r.location || '場所未記入'}</div>
          <div class="si-time">${r.time} ／ ${r.hours || '時間未記入'}</div>
        </div>
        <div class="si-revenue">${r.revenue ? '¥'+Number(r.revenue).toLocaleString() : '—'}</div>
      </div>
      <div class="si-detail">
        ${r.menu.map(m => `${m.name}:${m.qty}`).join(' / ') || '商材未記入'}
        ${r.weather ? ` ／ ${r.weather.icon}${r.weather.temp}` : ''}
      </div>
      ${r.memo ? `<div style="margin-top:6px;font-size:11px;color:#666;">${r.memo}</div>` : ''}
      <div style="margin-top:8px;">
        <button class="copy-btn" onclick="copyRecord(${savedRecords.indexOf(r)})">📋 コピー</button>
      </div>
    </div>
  `).join('');
}

function getDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function copyRecord(i) {
  const r = savedRecords[i];
  const text = [
    `📅 ${r.date} ${r.time}`,
    `📍 ${r.location || '—'} ／ ${r.hours || '—'}`,
    `${r.weather?.icon || ''} ${r.weather?.label || ''} ${r.weather?.temp || ''}`,
    `💰 売上：${r.revenue ? '¥'+Number(r.revenue).toLocaleString() : '—'}`,
    `👥 客数：${r.customers || '—'}人`,
    `🍗 ${r.menu.map(m => `${m.name}:${m.qty}個`).join(' / ')}`,
    r.memo ? `📝 ${r.memo}` : ''
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('📋 コピーしました'));
}

document.getElementById('submitBtn').addEventListener('click', () => {
  const location = document.getElementById('location').value.trim();
  const hours = document.getElementById('hours').value.trim();
  const revenue = document.getElementById('revenue').value;
  const customers = document.getElementById('customers').value;
  const memo = document.getElementById('memo').value.trim();

  const t = new Date();
  const timeStr = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;

  const record = {
    date: getDateStr(),
    time: timeStr,
    location,
    hours,
    revenue,
    customers,
    menu: menuItems.filter(m => m.name || m.qty > 0),
    memo,
    weather: fetchedWeather
  };

  savedRecords.push(record);
  localStorage.setItem('korogi_records', JSON.stringify(savedRecords));

  // リセット
  document.getElementById('location').value = '';
  document.getElementById('hours').value = '';
  document.getElementById('revenue').value = '';
  document.getElementById('customers').value = '';
  document.getElementById('memo').value = '';
  menuItems = menuItems.map(m => ({ ...m, qty: 0 }));
  renderMenuList();

  showToast('✅ 保存しました');
  renderSaved();
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderSaved();
</script>
</body>
</html>
