<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>コオロギ現場アプリ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F2F7;--white:#FFF;--border:#E0DFD8;--border2:#C8C6BE;
  --orange:#E8610A;--ol:#FFF0E8;--od:#C4510A;
  --text:#111;--muted:#888;--muted2:#C0BDB5;
  --green:#1A8A4A;--gl:#EBF9F1;
  --red:#CC3333;--rl:#FFF0F0;
  --blue:#1A3A9E;--bl:#EEF2FF;
  --navy:#1A237E;
  --radius:14px;--rsm:10px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.app{max-width:480px;margin:0 auto;padding-bottom:72px}

/* ヘッダー */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:11px 16px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{font-size:9px;color:var(--orange);font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.hdr-title{font-size:17px;font-weight:800}
.hdr-date{background:var(--bg);border-radius:8px;padding:5px 10px;text-align:right}
.hd-num{font-size:12px;font-weight:700}
.hd-day{font-size:9px;color:var(--muted);margin-top:1px}

/* 純利益バー */
.pstrip{background:var(--white);border-bottom:1.5px solid var(--border);padding:8px 14px;position:sticky;top:56px;z-index:19;display:flex;align-items:center;justify-content:space-between}
.ps-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.1em}
.ps-val{font-size:24px;font-weight:900;letter-spacing:-1px;transition:color .2s}
.ps-rate{font-size:10px;color:var(--muted);margin-top:1px}
.ps-pills{display:flex;gap:6px}
.ps-pill{background:var(--bg);border-radius:6px;padding:5px 8px;text-align:center;min-width:64px}
.pp-l{font-size:9px;color:var(--muted)}
.pp-v{font-size:12px;font-weight:800;margin-top:1px}

/* タブバー */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;gap:3px;transition:color .12s;touch-action:manipulation}
.tab-ic{font-size:20px;line-height:1}
.tab.active{color:var(--orange)}

/* ページ */
.page{display:none}.page.active{display:block}
.sec{padding:14px 14px 0}
.sec-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}

/* ─── レジ商品グリッド ─── */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.menu-btn{background:var(--white);padding:22px 12px 18px;text-align:center;cursor:pointer;position:relative;transition:background .1s;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.menu-btn:active{background:#F8F6F0}
.menu-btn.sel{background:#FFF8F4}
.mb-price{font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.5px}
.mb-unit{font-size:13px;font-weight:400;color:var(--muted)}
.mb-name{font-size:13px;font-weight:600;color:var(--blue);margin-top:6px}
.mb-badge{position:absolute;top:6px;right:8px;background:var(--red);color:white;border-radius:50%;width:24px;height:24px;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;line-height:1}
.mb-minus{position:absolute;top:8px;left:8px;background:#E8E6E0;border:none;border-radius:50%;width:24px;height:24px;font-size:16px;font-weight:900;color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}

/* レジ下部バー */
.regi-bar{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;gap:0;z-index:18}
.rb-history{background:var(--navy);color:white;border:none;font-family:inherit;font-size:14px;font-weight:800;padding:16px 18px;cursor:pointer;touch-action:manipulation;min-width:80px}
.rb-main{flex:1;background:var(--navy);color:white;border:none;border-left:1px solid rgba(255,255,255,.15);font-family:inherit;font-size:16px;font-weight:900;padding:16px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:space-between}
.rb-count{font-size:13px;font-weight:700;opacity:.8}
.rb-arrow{font-size:20px;opacity:.9}

/* ─── 会計画面 ─── */
.checkout-screen{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#fff;z-index:9999;flex-direction:column;overflow:hidden}
.checkout-screen.open{display:flex}
.cs-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.cs-back{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;touch-action:manipulation;padding:4px}
.cs-title{font-size:16px;font-weight:800;flex:1}
.cs-info{flex:1;padding:24px 16px 16px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;width:100%}
.cs-count{font-size:13px;color:var(--muted);margin-bottom:6px;text-align:right}
.cs-total{font-size:44px;font-weight:900;letter-spacing:-2px;text-align:right;white-space:nowrap;overflow:hidden}
.cs-cash-row{display:flex;align-items:center;padding:12px 16px;border-top:1px solid var(--border);gap:10px;width:100%;overflow:hidden}
.cs-cash-label{font-size:15px;color:var(--muted);font-weight:600;width:44px;flex-shrink:0}
.cs-cash-input{flex:1;min-width:0;font-size:26px;font-weight:900;background:var(--bg);border:none;outline:none;border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;text-align:right;width:100%;overflow:hidden}
.cs-change-row{padding:10px 16px 16px;text-align:right;font-size:15px;color:var(--muted)}
.cs-change-val{font-weight:900;color:var(--text);font-size:20px}
.cs-numpad{flex-shrink:0;width:100%}

/* テンキー */
.numpad{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border)}
.np-btn{background:var(--white);border:none;font-family:inherit;font-size:22px;font-weight:700;padding:18px 8px;cursor:pointer;text-align:center;touch-action:manipulation;transition:background .1s}
.np-btn:active{background:var(--bg)}
.np-btn.blue{background:var(--navy);color:white;font-size:14px;font-weight:900;line-height:1.3}
.np-btn.blue:active{background:#121859}
.np-btn.small{font-size:16px;color:var(--muted)}

/* 完了画面 */
.done-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;align-items:center;justify-content:center}
.done-modal.show{display:flex}
.done-box{background:var(--white);border-radius:20px;padding:32px 24px;width:90%;max-width:360px;text-align:center}
.done-icon{font-size:48px;margin-bottom:12px}
.done-title{font-size:20px;font-weight:900;margin-bottom:6px}
.done-sub{font-size:14px;color:var(--muted);margin-bottom:20px}
.done-btn{width:100%;padding:16px;background:var(--navy);border:none;border-radius:12px;color:white;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer;touch-action:manipulation;margin-bottom:8px}
.done-btn.sec{background:var(--bg);color:var(--text);border:1px solid var(--border)}

/* ─── 注文履歴 ─── */
.order-list-modal{display:none;position:fixed;inset:0;background:var(--white);z-index:45;max-width:480px;left:50%;transform:translateX(-50%);overflow-y:auto}
.olm-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--white);z-index:2}
.olm-title{font-size:16px;font-weight:800;flex:1}
.order-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.oi-time{font-size:11px;color:var(--muted);width:40px;flex-shrink:0;margin-top:2px}
.oi-body{flex:1}
.oi-items{font-size:13px;color:var(--text);line-height:1.5}
.oi-pay{font-size:10px;margin-top:3px}
.oi-pay.cash{color:var(--green)}.oi-pay.cashless{color:var(--blue)}
.oi-total{font-size:15px;font-weight:900;color:var(--orange);flex-shrink:0}
.oi-del{background:none;border:none;color:var(--muted2);font-size:18px;cursor:pointer;padding:2px;touch-action:manipulation}
.olm-summary{padding:14px 16px;background:var(--bg);border-top:1px solid var(--border);position:sticky;bottom:0}
.ols-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.ols-total{display:flex;justify-content:space-between;font-size:18px;font-weight:900;margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)}

/* ─── 純利益タブ ─── */
.profit-hero{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px}
.ph-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.ph-val{font-size:40px;font-weight:900;letter-spacing:-2px;transition:color .2s}
.ph-margin{font-size:12px;color:var(--muted);margin-top:4px}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.phg{background:var(--bg);border-radius:8px;padding:8px}
.phg-l{font-size:9px;color:var(--muted);letter-spacing:.06em;margin-bottom:3px}
.phg-v{font-size:13px;font-weight:800}
.input-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ir{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);gap:10px}
.ir:last-child{border-bottom:none}
.ir-ic{font-size:17px;width:26px;text-align:center;flex-shrink:0}
.ir-b{flex:1}
.ir-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;margin-bottom:3px}
.ir-note{font-size:10px;color:var(--green);margin-top:2px;font-weight:600}
.ir-note.auto{color:var(--blue)}
.ir-unit{font-size:12px;color:var(--muted);flex-shrink:0}
.auto-badge{background:var(--bl);color:var(--blue);border-radius:4px;font-size:9px;font-weight:700;padding:2px 6px;flex-shrink:0}
input.fi{background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:18px;font-weight:800;width:100%;-webkit-appearance:none}
input.fi::placeholder{color:var(--muted2);font-weight:400;font-size:14px}
input.fi.ro{color:var(--orange);font-size:22px}
.toggle-row{display:flex;gap:6px;margin-bottom:10px}
.tgl{flex:1;padding:9px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;touch-action:manipulation}
.tgl.active{background:var(--orange);border-color:var(--orange);color:white}
.staff-item,.cost-item{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px}
.sg{display:grid;grid-template-columns:1fr 78px 70px 26px;gap:7px;align-items:flex-end}
.cg{display:grid;grid-template-columns:1fr 96px 26px;gap:7px;align-items:flex-end}
.sf-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;display:block;margin-bottom:2px}
.sf-inp{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;font-weight:700;width:100%;padding:7px 8px;outline:none;-webkit-appearance:none}
.sf-inp:focus{border-color:var(--orange)}
.del-btn{background:none;border:none;color:var(--muted2);font-size:19px;cursor:pointer;padding:2px;touch-action:manipulation}
.del-btn:active{color:var(--red)}
.staff-total{font-size:11px;font-weight:700;color:var(--green);margin-top:5px}
.add-btn{width:100%;padding:12px;background:none;border:1.5px dashed var(--border2);border-radius:8px;color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation}
.add-btn:active{border-color:var(--orange);color:var(--orange)}
.save-area{padding:0 14px 10px;background:linear-gradient(to top,var(--bg) 60%,transparent);position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:15}
.save-btn{width:100%;padding:17px;background:var(--orange);border:none;border-radius:var(--radius);color:white;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:.04em;touch-action:manipulation}
.save-btn:active{background:var(--od)}

/* ─── 記録タブ ─── */
.rec-tabs{display:flex;gap:6px;margin-bottom:12px}
.rtab{flex:1;padding:9px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;touch-action:manipulation}
.rtab.active{background:var(--orange);border-color:var(--orange);color:white}
.rec-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:8px}
.ri-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ri-place{font-size:14px;font-weight:800}
.ri-time{font-size:10px;color:var(--muted);margin-top:2px}
.ri-rev{font-size:15px;font-weight:800;color:var(--orange)}
.ri-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.rg-l{font-size:9px;color:var(--muted);letter-spacing:.06em}
.rg-v{font-size:12px;font-weight:700;margin-top:2px}
.ri-net{margin-top:8px;background:var(--bg);border-radius:8px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center}
.ri-net-l{font-size:13px;font-weight:800}
.ri-net-v{font-size:18px;font-weight:900}
.ri-del{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:inherit;font-size:11px;padding:5px 10px;cursor:pointer;margin-top:8px;touch-action:manipulation}

/* ─── ダッシュボード ─── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.kpi-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.kpi-val{font-size:20px;font-weight:900}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px}
.kpi-delta{font-size:11px;font-weight:700;margin-top:3px}
.du{color:var(--green)}.dd{color:var(--red)}.df{color:var(--muted)}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px}
.chart-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.chart-wrap{position:relative;height:170px}
.bd-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.bd-title{padding:9px 13px;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.bd-row{display:flex;align-items:center;padding:8px 13px;border-bottom:1px solid var(--border);gap:9px}
.bd-row:last-child{border-bottom:none}
.bd-lbl{font-size:11px;color:var(--muted);width:52px;flex-shrink:0}
.bd-bar-wrap{flex:1;background:var(--bg);border-radius:3px;height:5px;overflow:hidden}
.bd-bar{height:100%;border-radius:3px;transition:width .5s}
.bd-val{font-size:12px;font-weight:700;width:82px;text-align:right;flex-shrink:0}
.year-sel{background:var(--white);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;font-weight:700;padding:8px 11px;outline:none;flex:1;-webkit-appearance:none}

/* ─── 設定タブ ─── */
.master-item{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px}
.master-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.master-name{font-size:13px;font-weight:800}
.master-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.mf label{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;display:block;margin-bottom:2px}
.mf input{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;font-weight:700;width:100%;padding:7px 8px;outline:none;-webkit-appearance:none}
.mf input:focus{border-color:var(--orange)}
.mc{margin-top:7px;font-size:11px;font-weight:700;color:var(--green)}
.sm-item{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px}
.sm-grid{display:grid;grid-template-columns:1fr 1fr 26px;gap:7px;align-items:flex-end}
.divider{height:1px;background:var(--border);margin:14px 14px 0}

/* ─── ユーティリティ ─── */
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-orange{color:var(--orange)}.c-muted{color:var(--muted)}.c-blue{color:var(--blue)}
.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;line-height:2}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--green);color:white;padding:11px 22px;border-radius:100px;font-size:14px;font-weight:700;z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast.show{transform:translateX(-50%) translateY(0)}
.weather-bar{background:var(--white);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:10px}
.wb-ic{font-size:20px}
.wb-info{flex:1;font-size:13px;font-weight:700}
.wb-sub{font-size:10px;color:var(--muted);font-weight:400}
.wb-temp{font-size:20px;font-weight:900;color:var(--orange)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div><div class="hdr-brand">Roast Chicken Korogi</div><div class="hdr-title" id="pageTitle">レジ</div></div>
    <div class="hdr-date"><div class="hd-num" id="dateDisplay">—</div><div class="hd-day" id="dayDisplay">—</div></div>
  </div>

  <div class="pstrip" id="profitStrip">
    <div>
      <div class="ps-lbl">純利益</div>
      <div class="ps-val c-green" id="psVal">¥0</div>
      <div class="ps-rate" id="psRate">—</div>
    </div>
    <div class="ps-pills">
      <div class="ps-pill"><div class="pp-l">売上</div><div class="pp-v c-orange" id="ppRev">¥0</div></div>
      <div class="ps-pill"><div class="pp-l">費用計</div><div class="pp-v c-red" id="ppCost">¥0</div></div>
    </div>
  </div>

  <!-- ══ PAGE: レジ ══ -->
  <div class="page active" id="page-regi">
    <div id="weatherBar" class="weather-bar" style="display:none">
      <div class="wb-ic" id="wIc">⏳</div>
      <div><div class="wb-info" id="wLbl">取得中...</div><div class="wb-sub" id="wSub"></div></div>
      <div class="wb-temp" id="wTemp">—</div>
    </div>
    <div class="sec" style="padding-top:14px">
      <div class="menu-grid" id="menuGrid"></div>
      <button class="add-btn" id="addMenuBtn">+ 商品を追加</button>
    </div>
    <div style="height:70px"></div>
  </div>

  <!-- ══ PAGE: 純利益 ══ -->
  <div class="page" id="page-profit">
    <div class="sec" style="margin-top:14px">
      <div class="profit-hero">
        <div><div class="ph-lbl">純利益</div><div class="ph-val c-green" id="phNet">¥0</div><div class="ph-margin" id="phMargin">—</div></div>
        <div class="ph-grid">
          <div class="phg"><div class="phg-l">税込売上</div><div class="phg-v c-orange" id="phRI">¥0</div></div>

<script>
// ══════════ 初期化 ══════════
const DAYS=['日','月','火','水','木','金','土'];
const now=new Date();
document.getElementById('dateDisplay').textContent=`${now.getMonth()+1}/${now.getDate()}`;
document.getElementById('dayDisplay').textContent=`${now.getFullYear()} (${DAYS[now.getDay()]})`;
const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

const KEY={master:'korogi_master',staff:'korogi_staff',records:'korogi_records',orders:'korogi_orders'};

let masterItems=JSON.parse(localStorage.getItem(KEY.master)||'null')||[
  {id:1,name:'もも',price:1000,costRate:35},
  {id:2,name:'パック',price:1900,costRate:35},
  {id:3,name:'チーズサンド',price:900,costRate:35},
  {id:4,name:'ハニマスサンド',price:1000,costRate:35},
  {id:5,name:'てりやきサンド',price:900,costRate:35},
  {id:6,name:'明太子サンド',price:1000,costRate:35},
  {id:7,name:'てり丼',price:1200,costRate:35},
  {id:8,name:'サルサ丼',price:1200,costRate:35},
  {id:9,name:'プレート',price:1300,costRate:35},
  {id:10,name:'ケバブ',price:900,costRate:35},
  {id:11,name:'ポテト塩',price:800,costRate:35},
];
let masterNextId=Math.max(...masterItems.map(m=>m.id),0)+1;
const saveMaster=()=>localStorage.setItem(KEY.master,JSON.stringify(masterItems));

let staffMaster=JSON.parse(localStorage.getItem(KEY.staff)||'[]');
let staffMasterNextId=Math.max(...(staffMaster.map(s=>s.id||0).concat([0])),0)+1;
const saveStaffMaster=()=>localStorage.setItem(KEY.staff,JSON.stringify(staffMaster));

let savedRecords=JSON.parse(localStorage.getItem(KEY.records)||'[]');

// 当日注文履歴（日付が変わったらリセット）
let todayOrders=JSON.parse(localStorage.getItem(KEY.orders)||'[]');
if(todayOrders.length&&todayOrders[0].date!==todayStr) todayOrders=[];

let cart={};// {id: qty}
let venueType='fixed';
let staffItems=[];
let otherCosts=[];
let orderCounter=todayOrders.length+1;

// ══════════ タブ ══════════
function switchTab(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelector(`[data-tab="${page}"]`).classList.add('active');
  const titles={regi:'レジ',profit:'純利益',records:'記録・分析',settings:'設定'};
  document.getElementById('pageTitle').textContent=titles[page];
  const strip=['regi','profit'].includes(page);
  document.getElementById('profitStrip').style.display=strip?'flex':'none';
  document.getElementById('regiBar').style.display=page==='regi'?'flex':'none';
  document.getElementById('saveArea').style.display=page==='profit'?'block':'none';
  if(page==='records'){renderSaved();populateDashYears();}
  if(page==='settings'){renderMaster();renderStaffMasterList();}
}

// ══════════ 天気 ══════════
const wCodes={0:'快晴',1:'晴れ',2:'晴れ時々曇り',3:'☁️ 曇り',45:'霧',51:'小雨',53:'雨',61:'小雨',63:'雨',65:'大雨',71:'雪',80:'にわか雨',95:'雷雨'};
const wIcons={0:'☀️',1:'🌤',2:'⛅',3:'☁️',51:'🌦',53:'🌧',61:'🌦',63:'🌧',65:'🌧',71:'🌨',80:'🌦',95:'⛈'};
function getWeather(lat,lon){
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&timezone=Asia%2FTokyo`)
    .then(r=>r.json()).then(d=>{
      const code=d.current.weathercode,temp=Math.round(d.current.temperature_2m);
      document.getElementById('wIc').textContent=wIcons[code]||'🌡';
      document.getElementById('wLbl').textContent=wCodes[code]||'—';
      document.getElementById('wSub').textContent='自動取得';
      document.getElementById('wTemp').textContent=`${temp}℃`;
      document.getElementById('weatherBar').style.display='flex';
    }).catch(()=>{});
}
navigator.geolocation
  ?navigator.geolocation.getCurrentPosition(p=>getWeather(p.coords.latitude,p.coords.longitude),()=>getWeather(35.6762,139.6503))
  :getWeather(35.6762,139.6503);

// ══════════ レジ ══════════
function renderMenuGrid(){
  const grid=document.getElementById('menuGrid');
  grid.innerHTML=masterItems.map(m=>{
    const qty=cart[m.id]||0;
    return `<div class="menu-btn${qty>0?' sel':''}" onclick="addToCart(${m.id})">
      ${qty>0?`<button class="mb-minus" onclick="event.stopPropagation();removeFromCart(${m.id})">−</button>`:''}
      ${qty>0?`<div class="mb-badge">${qty}</div>`:''}
      <div class="mb-price">${m.price.toLocaleString()}<span class="mb-unit">円</span></div>
      <div class="mb-name">${m.name}</div>
    </div>`;
  }).join('');
  updateRegiBar();
}

function addToCart(id){cart[id]=(cart[id]||0)+1;renderMenuGrid();}
function removeFromCart(id){
  cart[id]=(cart[id]||0)-1;
  if(cart[id]<=0) delete cart[id];
  renderMenuGrid();
}

function updateRegiBar(){
  const total=Object.entries(cart).reduce((s,[id,qty])=>{const m=masterItems.find(x=>x.id==id);return s+(m?m.price*qty:0);},0);
  const count=Object.values(cart).reduce((s,q)=>s+q,0);
  document.getElementById('rbCount').textContent=`${count}点`;
  document.getElementById('rbTotal').textContent=`¥${total.toLocaleString()}`;
}

// ══════════ 会計画面 ══════════
let cashStr='';
function openCheckout(){
  const total=Object.entries(cart).reduce((s,[id,qty])=>{const m=masterItems.find(x=>x.id==id);return s+(m?m.price*qty:0);},0);
  const count=Object.values(cart).reduce((s,q)=>s+q,0);
  if(count===0){showToast('商品を選択してください');return;}
  cashStr='';
  document.getElementById('cashInput').value='';
  document.getElementById('changeVal').textContent='¥0';
  document.getElementById('csTotalCount').textContent=`${count}点合計`;
  document.getElementById('csTotalAmt').textContent=`¥${total.toLocaleString()}`;
  document.getElementById('checkoutScreen').classList.add('open');
}
function closeCheckout(){document.getElementById('checkoutScreen').classList.remove('open');}

function npInput(v){
  const unitMap={'100':100,'1000':1000,'10000':10000};
  if(unitMap[v]){
    // 百/千/万：現在の数字 × 単位（例：5→千=5000）
    // 現在値が0または空なら単位そのものを使う
    const cur=parseInt(cashStr)||1;
    cashStr=String(cur*unitMap[v]);
  } else {
    // 数字・00・000は桁を末尾に連結
    if(cashStr===''||cashStr==='0') cashStr=v;
    else cashStr=cashStr+v;
  }
  const num=parseInt(cashStr)||0;
  document.getElementById('cashInput').value=num.toLocaleString();
  updateChange();
}
function npDel(){
  cashStr=cashStr.slice(0,-1)||'';
  const num=parseInt(cashStr)||0;
  document.getElementById('cashInput').value=cashStr?num.toLocaleString():'';
  updateChange();
}
function npClear(){
  cashStr='';
  document.getElementById('cashInput').value='';
  document.getElementById('changeVal').textContent='¥0';
}
function updateChange(){
  const total=parseInt(document.getElementById('csTotalAmt').textContent.replace(/[¥,]/g,'')||'0');
  const cash=parseInt(cashStr)||0;
  const change=cash-total;
  if(!cashStr){document.getElementById('changeVal').textContent='¥0';return;}
  document.getElementById('changeVal').textContent=change>=0?`¥${change.toLocaleString()}`:'¥—';
}

function completeCheckout(payType){
  const total=Object.entries(cart).reduce((s,[id,qty])=>{const m=masterItems.find(x=>x.id==id);return s+(m?m.price*qty:0);},0);
  const count=Object.values(cart).reduce((s,q)=>s+q,0);
  if(count===0) return;
  const cash=payType==='cash'?parseInt(cashStr)||0:0;
  const change=payType==='cash'?Math.max(0,cash-total):0;
  const t=new Date();
  const timeStr=`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  const items=Object.entries(cart).map(([id,qty])=>{
    const m=masterItems.find(x=>x.id==id);
    return{id:+id,name:m?.name||'?',price:m?.price||0,costRate:m?.costRate||0,qty};
  });
  const order={date:todayStr,time:timeStr,no:orderCounter++,items,total,payType,cash,change};
  todayOrders.push(order);
  localStorage.setItem(KEY.orders,JSON.stringify(todayOrders));
  cart={};
  closeCheckout();
  renderMenuGrid();
  calcProfit();
  // 完了モーダル
  document.getElementById('doneIcon').textContent=payType==='cash'?'💴':'📱';
  document.getElementById('doneTitle').textContent='会計完了';
  const payLabel=payType==='cash'?`現金 ¥${cash.toLocaleString()}（おつり ¥${change.toLocaleString()}）`:'キャッシュレス';
  document.getElementById('doneSub').textContent=`¥${total.toLocaleString()} · ${payLabel}`;
  document.getElementById('doneModal').classList.add('show');
}
function closeDone(){document.getElementById('doneModal').classList.remove('show');}

// ══════════ 注文履歴 ══════════
function showOrderList(){
  renderOrderList();
  document.getElementById('orderListModal').style.display='block';
}
function closeOrderList(){document.getElementById('orderListModal').style.display='none';}

function renderOrderList(){
  const body=document.getElementById('orderListBody');
  const summary=document.getElementById('orderListSummary');
  if(!todayOrders.length){body.innerHTML='<div class="empty">まだ会計がありません</div>';summary.innerHTML='';return;}
  body.innerHTML=[...todayOrders].reverse().map((o,ri)=>{
    const idx=todayOrders.length-1-ri;
    const payLbl=o.payType==='cash'?'現金':'キャッシュレス';
    const payClass=o.payType==='cash'?'cash':'cashless';
    const itemStr=o.items.map(i=>`${i.name}×${i.qty}`).join('・');
    return `<div class="order-item">
      <div class="oi-time">${o.time}</div>
      <div class="oi-body">
        <div class="oi-items">${itemStr}</div>
        <div class="oi-pay ${payClass}">${payLbl}${o.payType==='cash'&&o.cash?` ¥${o.cash.toLocaleString()}→おつり¥${o.change.toLocaleString()}`:''}
        </div>
      </div>
      <div class="oi-total">¥${o.total.toLocaleString()}</div>
      <button class="oi-del" onclick="deleteOrder(${idx})">×</button>
    </div>`;
  }).join('');
  const totalAll=todayOrders.reduce((s,o)=>s+o.total,0);
  const cashTotal=todayOrders.filter(o=>o.payType==='cash').reduce((s,o)=>s+o.total,0);
  const cashlessTotal=todayOrders.filter(o=>o.payType==='cashless').reduce((s,o)=>s+o.total,0);
  summary.innerHTML=`
    <div class="ols-row"><span>現金</span><span class="c-green" style="font-weight:700">¥${cashTotal.toLocaleString()}</span></div>
    <div class="ols-row"><span>キャッシュレス</span><span class="c-blue" style="font-weight:700">¥${cashlessTotal.toLocaleString()}</span></div>
    <div class="ols-total"><span>合計（${todayOrders.length}件）</span><span class="c-orange">¥${totalAll.toLocaleString()}</span></div>`;
}
function deleteOrder(i){
  if(!confirm('この会計を削除しますか？'))return;
  todayOrders.splice(i,1);
  localStorage.setItem(KEY.orders,JSON.stringify(todayOrders));
  renderOrderList();calcProfit();
}

// ══════════ 純利益計算 ══════════
function getTodayRevenue(){return todayOrders.reduce((s,o)=>s+o.total,0);}
function getTodayCogs(){return todayOrders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+Math.round(i.price*(i.costRate/100))*i.qty,0),0);}

function setVT(type){
  venueType=type;
  ['Fixed','Rate','None'].forEach(t=>document.getElementById('btn'+t).classList.toggle('active',t.toLowerCase()===type));
  document.getElementById('vFixedRow').style.display=type==='fixed'?'flex':'none';
  document.getElementById('vRateRow').style.display=type==='rate'?'flex':'none';
  document.getElementById('venueCard').style.display=type==='none'?'none':'block';
  calcProfit();
}

function calcProfit(){
  const revInc=getTodayRevenue();
  const taxRate=+(document.getElementById('taxRate').value)||10;
  const revEx=Math.round(revInc/(1+taxRate/100));
  const taxAmt=revInc-revEx;
  document.getElementById('taxNote').textContent=`税抜: ¥${revEx.toLocaleString()} ／ 税額: ¥${taxAmt.toLocaleString()}`;
  document.getElementById('revDisplay').value=`¥${revInc.toLocaleString()}`;

  let venueFee=0;
  if(venueType==='fixed') venueFee=+(document.getElementById('venueFee').value)||0;
  else if(venueType==='rate'){
    const pct=+(document.getElementById('vRatePct').value)||0;
    venueFee=Math.round(revEx*pct/100);
    document.getElementById('vRateNote').textContent=`= ¥${venueFee.toLocaleString()}`;
  }
  const cogsTotal=getTodayCogs();
  const laborTotal=staffItems.reduce((s,st)=>s+Math.round((st.wage||0)*(st.hours||0)),0);
  const otherTotal=otherCosts.reduce((s,oc)=>s+(oc.amount||0),0);
  const totalCost=cogsTotal+venueFee+laborTotal+otherTotal;
  const net=revEx-totalCost;
  const margin=revEx>0?Math.round((net/revEx)*100):0;

  const nc=net>=0?'c-green':'c-red';
  document.getElementById('phRI').textContent='¥'+revInc.toLocaleString();
  document.getElementById('phRE').textContent='¥'+revEx.toLocaleString();
  document.getElementById('phCG').textContent='¥'+cogsTotal.toLocaleString();
  document.getElementById('phVN').textContent='¥'+venueFee.toLocaleString();
  document.getElementById('phLB').textContent='¥'+laborTotal.toLocaleString();
  document.getElementById('phOT').textContent='¥'+otherTotal.toLocaleString();
  document.getElementById('phNet').textContent='¥'+net.toLocaleString();
  document.getElementById('phNet').className='ph-val '+nc;
  document.getElementById('phMargin').textContent=revEx>0?`純利益率 ${margin}% ／ 税抜売上 ¥${revEx.toLocaleString()}`:'売上がありません';

  // フローティングバー
  document.getElementById('psVal').textContent='¥'+net.toLocaleString();
  document.getElementById('psVal').className='ps-val '+nc;
  document.getElementById('psRate').textContent=revEx>0?`純利益率 ${margin}%`:'—';
  document.getElementById('ppRev').textContent='¥'+revInc.toLocaleString();
  document.getElementById('ppCost').textContent='¥'+totalCost.toLocaleString();

  return{revInc,revEx,taxRate,venueFee,cogsTotal,laborTotal,otherTotal,net,margin};
}

// ══════════ スタッフ ══════════
function renderStaffList(){
  const c=document.getElementById('staffList');

const GAS_URL='https://script.google.com/macros/s/AKfycbwz92XzoDS4vMk3W0jSnCgThluC1WcYOnxlCEXfSxjN6wExGBuTu6_k-mUsl_RyKByRbw/exec';
function sendToSheets(r){
  const p=new URLSearchParams({
    date:r.date,time:r.time,location:r.location||'',
    revenueTaxInc:r.revInc,revenueTaxEx:r.revEx,
    cogsTotal:r.cogsTotal,venueFee:r.venueFee,
    laborTotal:r.laborTotal,otherTotal:r.otherTotal,
    netProfit:r.net,margin:r.margin,customers:r.customers||'',
    cashTotal:r.cashTotal,cashlessTotal:r.cashlessTotal,orderCount:r.orderCount,
    memo:r.memo||'',
  });
  fetch(GAS_URL+'?'+p.toString())
    .then(res=>res.json())
    .then(d=>showToast(d.result==='success'?'保存＆Sheetsに送信完了！':'ローカル保存済み（Sheetsエラー）'))
    .catch(()=>showToast('ローカル保存済み（Sheets未送信）'));
}

function saveRecord(){
  const calc=calcProfit();
  const t=new Date();
  const timeStr=`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  const cashTotal=todayOrders.filter(o=>o.payType==='cash').reduce((s,o)=>s+o.total,0);
  const cashlessTotal=todayOrders.filter(o=>o.payType==='cashless').reduce((s,o)=>s+o.total,0);
  const record={
    date:todayStr,time:timeStr,
    location:document.getElementById('location').value.trim(),
    customers:document.getElementById('customers').value,
    memo:document.getElementById('memo').value.trim(),
    venueType,
    revInc:calc.revInc,revEx:calc.revEx,taxRate:calc.taxRate,
    venueFee:calc.venueFee,cogsTotal:calc.cogsTotal,
    staff:staffItems.map(s=>({name:s.name,wage:s.wage,hours:s.hours,total:Math.round((s.wage||0)*(s.hours||0))})),
    laborTotal:calc.laborTotal,
    otherCosts:[...otherCosts],otherTotal:calc.otherTotal,
    orders:[...todayOrders],cashTotal,cashlessTotal,orderCount:todayOrders.length,
    net:calc.net,margin:calc.margin,
  };
  savedRecords.push(record);
  localStorage.setItem(KEY.records,JSON.stringify(savedRecords));
  sendToSheets(record);
  // リセット
  document.getElementById('location').value='';
  document.getElementById('customers').value='';
  document.getElementById('memo').value='';
  document.getElementById('venueFee').value='';
  document.getElementById('vRatePct').value='';
  staffItems=[];otherCosts=[];todayOrders=[];cart={};orderCounter=1;
  localStorage.setItem(KEY.orders,JSON.stringify(todayOrders));
  renderStaffList();renderOtherList();renderMenuGrid();calcProfit();
}

function populateDashYears(){
  const years=[...new Set(savedRecords.map(r=>r.date?.slice(0,4)).filter(Boolean))].sort().reverse();
  const sel=document.getElementById('dashYear');const cur=sel.value;
  sel.innerHTML=years.length?years.map(y=>`<option value="${y}">${y}年</option>`):'<option value="">データなし</option>';
  if(cur&&years.includes(cur))sel.value=cur;
}
function buildYS(year){
  const recs=savedRecords.filter(r=>r.date?.slice(0,4)===year);
  if(!recs.length)return null;
  const a={year,days:recs.length,revInc:0,revEx:0,cogs:0,venue:0,labor:0,other:0,net:0,customers:0,cash:0,cashless:0};
  recs.forEach(r=>{a.revInc+=r.revInc||0;a.revEx+=r.revEx||0;a.cogs+=r.cogsTotal||0;a.venue+=r.venueFee||0;a.labor+=r.laborTotal||0;a.other+=r.otherTotal||0;a.net+=r.net||0;a.customers+=parseInt(r.customers||0);a.cash+=r.cashTotal||0;a.cashless+=r.cashlessTotal||0;});
  a.avgMargin=a.revEx>0?Math.round((a.net/a.revEx)*100):0;
  a.avgNetPerDay=a.days>0?Math.round(a.net/a.days):0;
  return a;
}
let bChart=null,lChart=null;
function renderDash(){
  const year=document.getElementById('dashYear').value;
  const cont=document.getElementById('dashContent');
  if(!year||!savedRecords.length){cont.innerHTML='<div class="empty">記録がありません</div>';return;}
  const cur=buildYS(year);if(!cur){cont.innerHTML=`<div class="empty">${year}年の記録がありません</div>`;return;}
  const prev=buildYS(String(parseInt(year)-1));
  const allStats=[...new Set(savedRecords.map(r=>r.date?.slice(0,4)).filter(Boolean))].sort().map(y=>buildYS(y)).filter(Boolean);
  const delta=(c,p,isRate=false)=>{if(!p||p===0)return '';const d=c-p,pct=Math.round((d/Math.abs(p))*100),sign=d>=0?'+':'';const cls=d>0?'du':d<0?'dd':'df';return `<div class="kpi-delta ${cls}">${sign}${isRate?pct+'%':('¥'+Math.abs(d).toLocaleString())} (${sign}${pct}%) 前年比</div>`;};
  const totalCost=cur.cogs+cur.venue+cur.labor+cur.other;
  const bItems=[{l:'原価',v:cur.cogs,c:'#CC3333'},{l:'出店料',v:cur.venue,c:'#B45309'},{l:'人件費',v:cur.labor,c:'#2563EB'},{l:'その他',v:cur.other,c:'#888'}];
  const tvMap={};savedRecords.filter(r=>r.date?.slice(0,4)===year&&r.location).forEach(r=>{if(!tvMap[r.location])tvMap[r.location]={name:r.location,days:0,net:0};tvMap[r.location].days++;tvMap[r.location].net+=r.net||0;});
  const topV=Object.values(tvMap).sort((a,b)=>b.net-a.net).slice(0,5);
  cont.innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-lbl">累計純利益</div><div class="kpi-val ${cur.net>=0?'c-green':'c-red'}">¥${cur.net.toLocaleString()}</div><div class="kpi-sub">${cur.days}日間</div>${delta(cur.net,prev?.net)}</div>
      <div class="kpi-card"><div class="kpi-lbl">平均純利益率</div><div class="kpi-val ${cur.avgMargin>=0?'c-green':'c-red'}">${cur.avgMargin}%</div><div class="kpi-sub">税抜売上ベース</div>${delta(cur.avgMargin,prev?.avgMargin,true)}</div>
      <div class="kpi-card"><div class="kpi-lbl">累計税抜売上</div><div class="kpi-val c-orange">¥${cur.revEx.toLocaleString()}</div><div class="kpi-sub">出店${cur.days}回</div>${delta(cur.revEx,prev?.revEx)}</div>
      <div class="kpi-card"><div class="kpi-lbl">1日あたり純利益</div><div class="kpi-val ${cur.avgNetPerDay>=0?'c-green':'c-red'}">¥${cur.avgNetPerDay.toLocaleString()}</div><div class="kpi-sub">平均/出店日</div>${delta(cur.avgNetPerDay,prev?.avgNetPerDay)}</div>
    </div>
    <div class="kpi-grid" style="margin-bottom:12px">
      <div class="kpi-card"><div class="kpi-lbl">現金売上</div><div class="kpi-val c-green">¥${cur.cash.toLocaleString()}</div></div>
      <div class="kpi-card"><div class="kpi-lbl">キャッシュレス売上</div><div class="kpi-val c-blue">¥${cur.cashless.toLocaleString()}</div></div>
    </div>
    <div class="chart-card"><div class="chart-lbl">月別純利益（${year}年）</div><div class="chart-wrap"><canvas id="lChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-lbl">年次比較</div><div class="chart-wrap"><canvas id="bChart"></canvas></div></div>
    <div class="bd-card"><div class="bd-title">コスト内訳</div>${bItems.map(b=>`<div class="bd-row"><div class="bd-lbl">${b.l}</div><div class="bd-bar-wrap"><div class="bd-bar" style="width:${totalCost>0?Math.round(b.v/totalCost*100):0}%;background:${b.c}"></div></div><div class="bd-val" style="color:${b.c}">¥${b.v.toLocaleString()}</div></div>`).join('')}</div>
    ${topV.length?`<div class="bd-card"><div class="bd-title">現場別純利益ランキング</div>${topV.map((v,i)=>`<div class="bd-row"><div style="font-size:12px;color:var(--muted);width:16px">${i+1}</div><div style="flex:1;font-size:13px;font-weight:700;padding:0 8px">${v.name}<div style="font-size:10px;color:var(--muted);font-weight:400">${v.days}回</div></div><div style="font-size:13px;font-weight:700;${v.net>=0?'color:var(--green)':'color:var(--red)'}">¥${v.net.toLocaleString()}</div></div>`).join('')}</div>`:''}
    ${allStats.length>1?`<div class="bd-card"><div class="bd-title">年次比較テーブル</div>${allStats.map(s=>`<div class="bd-row" style="${s.year===year?'background:#FFF8F4':''}"><div style="font-size:13px;font-weight:800;width:40px;${s.year===year?'color:var(--orange)':''}">${s.year}</div><div style="flex:1;font-size:12px;font-weight:700;padding:0 8px">¥${s.revEx.toLocaleString()}</div><div style="font-size:12px;font-weight:700;${s.net>=0?'color:var(--green)':'color:var(--red)'}">¥${s.net.toLocaleString()}</div><div style="font-size:12px;font-weight:700;${s.avgMargin>=0?'color:var(--green)':'color:var(--red)'};width:40px;text-align:right">${s.avgMargin}%</div></div>`).join('')}</div>`:''}
  `;
  setTimeout(()=>{
    const lc=document.getElementById('lChart');
    if(lc){if(lChart)lChart.destroy();const months=Array.from({length:12},(_,i)=>i+1);const data=months.map(m=>savedRecords.filter(r=>r.date?.slice(0,4)===year&&parseInt(r.date.split('-')[1])===m).reduce((s,r)=>s+(r.net||0),0));lChart=new Chart(lc,{type:'line',data:{labels:months.map(m=>`${m}月`),datasets:[{label:'純利益',data,borderColor:'#1A8A4A',backgroundColor:'rgba(26,138,74,.1)',borderWidth:2,pointRadius:3,tension:.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#888',font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#888',font:{size:10},callback:v=>'¥'+(v/10000).toFixed(0)+'万'}}}}});}
    const bc=document.getElementById('bChart');
    if(bc&&allStats.length){if(bChart)bChart.destroy();bChart=new Chart(bc,{type:'bar',data:{labels:allStats.map(s=>s.year+'年'),datasets:[{label:'税抜売上',data:allStats.map(s=>s.revEx),backgroundColor:'rgba(232,97,10,.4)',borderColor:'#E8610A',borderWidth:1},{label:'純利益',data:allStats.map(s=>s.net),backgroundColor:'rgba(26,138,74,.4)',borderColor:'#1A8A4A',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888',font:{size:10}}}},scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#888',font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#888',font:{size:10},callback:v=>'¥'+(v/10000).toFixed(0)+'万'}}}}});}
  },50);
}
